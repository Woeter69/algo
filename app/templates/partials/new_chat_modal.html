<div class="modal-overlay" id="newChatModal" style="display: none">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Start New Chat</h3>
      <button class="modal-close" id="closeModal">×</button>
    </div>
    <div class="modal-body">
      <p>Enter the username of the person you want to chat with:</p>
      <input
        class="username-input"
        id="usernameInput"
        placeholder="Enter username..."
        type="text"
      />
      <div class="modal-error" id="modalError" style="display: none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-start-chat" id="startChatBtn">Start Chat</button>
    </div>
  </div>
</div>
