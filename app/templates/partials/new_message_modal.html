<div class="modal-overlay" id="newMessageModal">

      <h3>New Message</h3>
      <button class="modal-close" id="closeNewMessageModal">
        <i class="fas fa-times"></i>

    </div>
    <div class="modal-content">
      <div class="search-users">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input
            id="userSearchInput"
            placeholder="Search people..."
            type="text"
          />
        </div>
      </div>
      <div class="users-list" id="usersList">
        <div class="user-item" data-user-id="6">
          <div class="user-avatar">
            <img alt="" src="https://via.placeholder.com/40" />
          </div>
          <div class="user-info">
            <h4>John Smith</h4>
            <p>Software Engineer at Google</p>
          </div>
          <button class="message-user-btn">Message</button>
        </div>
        <div class="user-item" data-user-id="7">
          <div class="user-avatar">
            <img alt="" src="https://via.placeholder.com/40" />
          </div>
          <div class="user-info">
            <h4>Lisa Wang</h4>
            <p>Product Manager at Microsoft</p>
          </div>
          <button class="message-user-btn">Message</button>
        </div>
        <div class="user-item" data-user-id="8">
          <div class="user-avatar">
            <img alt="" src="https://via.placeholder.com/40" />
          </div>
          <div class="user-info">
            <h4>David Brown</h4>
            <p>Data Scientist at Amazon</p>
          </div>
          <button class="message-user-btn">Message</button>
        </div>
      </div>
    </div>
  </div>
</div>
