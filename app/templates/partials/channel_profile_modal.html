<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Profile Details</h3>
      <button class="modal-close" id="closeProfileModal" type="button">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-content">
      <div class="profile-preview" id="profilePreview">
        <!-- Profile details will be populated -->
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="closePreview" type="button">
          Close
        </button>
        <button
          class="btn"
          id="profileFromPreview"
          style="display: inline-flex"
          type="button"
        >
          <i class="fas fa-user"></i> View Profile
        </button>
        <button
          class="btn"
          id="connectFromPreview"
          style="display: inline-flex"
          type="button"
        >
          <i class="fas fa-user-plus"></i> Connect
        </button>
        <button
          class="btn"
          id="messageFromPreview"
          style="display: inline-flex"
          type="button"
        >
          <i class="fas fa-comment"></i> Chat
        </button>
      </div>
    </div>
  </div>
</div>
